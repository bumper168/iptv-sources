name: 更新直播源

on:
  schedule:
    - cron: '0 2 * * *'  # 每天凌晨2点（UTC时间，北京时间上午10点
  workflow_dispatch:  # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install requests

      - name: 运行收集脚本
        run: |
          cd tools
          python collect_sources.py

      - name: 生成更新文件
        run: |
          # 把 output 目录下的 .m3u 文件复制到根目录
          cp tools/output/yangshi.m3u yangshi.m3u 2>/dev/null || echo "no yangshi"
          cp tools/output/weishi.m3u weishi.m3u 2>/dev/null || echo "no weishi"
          cp tools/output/difang.m3u difang.m3u 2>/dev/null || echo "no difang"
          cp tools/output/gangtai.m3u gangtai.m3u 2>/dev/null || echo "no gangtai"
          cp tools/output/guowai.m3u guowai.m3u 2>/dev/null || echo "no guowai"

      - name: 提交更新
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add *.m3u
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新直播源 $(date +%Y-%m-%d)" && git push)
